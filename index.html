<head>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; margin: 0; padding: 100px 20px; }

<body>

    <h1 style="text-align:center;">රසවත් ආහාර වට්ටෝරු</h1>

    <div class="recipe-grid" id="container"></div>

            <h3>අවශ්‍ය ද්‍රව්‍ය:</h3><ul id="ings"></ul>
            <h3>සාදන ක්‍රමය:</h3><ol id="steps"></ol>

    <script>
        const recipes = [
            {id:1, title:"පරිප්පු කරිය", desc:"රසවත් පරිප්පු කරිය.", ing:["පරිප්පු - කෝප්ප 1", "පොල් කිරි - කෝප්ප 1", "ලූණු - 1 (කපාගත්)", "සුදුළූණු - කරාබු 3", "ඉඟුරු - කුඩා කැබැල්ලක්", "කරපිංචා - ඕලු 8-10", "තුනපහ (කහ, මාළුමිරිස්, ගම්මිරිස් කුඩු) - 1/2 හැදි", "රට කුරුඳු - කොකු 1", "ලූණු රසයට"], steps:["පරිප්පු වතුරෙන් හොඳින් සෝදාගන්න.", "ලූණු, සුදුළූණු, ඉඟුරු, කරපිංචා සහ තුනපහ එක්ක පරිප්පු සහ වතුර කෝප්ප 2ක් සමග උයන ලෑන්දකට දාන්න.", "මධ්‍යම ගින්නක මිනිත්තු 15ක් තම්බන්න.", "පොල් කිරි එක් කර තවත් මිනිත්තු 5ක් උයන්න.", "ලූණු රසට එක් කර හොඳින් මෙහෙයාගෙන සේවය කරන්න."]},
            {id:2, title:"චිකන් කරිය", desc:"කුළුබඩු සහිත චිකන්.", ing:["චිකන් - ග්‍රෑම් 500", "ලූණු - 2 (කපාගත්)", "තක්කාලි - 1", "සුදුළූණු-ඉඟුරු පේස්ට් - හැදි 1", "මිරිස් කුඩු - හැදි 1", "කහ කුඩු - 1/2 හැදි", "ගම්මිරිස් කුඩු - 1/2 හැදි", "කරපිංචා, රම්පේ - ටිකක්", "පොල් කිරි - කෝප්ප 1", "තෙල් - හැදි 2", "ලූණු රසයට"], steps:["චිකන් කැබලි වතුරෙන් සෝදාගන්න.", "තෙල් රත් කර ලූණු, කරපිංචා, රම්පේ දාලා තෙම්පරාදු කරන්න.", "සුදුළූණු-ඉඟුරු පේස්ට් සහ කුළුබඩු දාලා මිනිත්තු 2ක් මහන්න.", "තක්කාලි සහ චිකන් එක් කර හොඳින් මෙහෙයාගන්න.", "පොල් කිරි එක් කර, ආවරණය කර මධ්‍යම ගින්නක මිනිත්තු 20-25ක් උයන්න.", "ලූණු රසට බැලීමෙන් පසු සේවය කරන්න."]},
            {id:3, title:"පොල් සම්බෝල", desc:"අලුත් පොල්.", ing:["ගාගත් පොල් - කෝප්ප 1", "මිරිස් කුඩු හෝ අමු මිරිස් - 2-3", "ලූණු - කුඩා පෙත්තක්", "දෙහි - 1/2 ක ඉස්ම", "මාළු ඇඹුල් (Maldive fish) - හැදි 1 (කැප්පුවොත්)", "ලූණු රසයට"], steps:["ගාගත් පොල්, මිරිස්, ලූණු සහ මාළු ඇඹුල් එකට අඹරාගන්න හෝ අතින් මිශ්‍ර කරගන්න.", "දෙහි ඉස්ම සහ ලූණු එක් කරගන්න.", "හොඳින් මෙහෙයාගෙන රසට බලාගන්න.", "බතට හෝ රොටිවලට සේවය කරන්න."]},
            {id:4, title:"මාළු ඇඹුල් තියල්", desc:"පැරණි ක්‍රමය.", ing:["මාළු (කෙළවලු/සැලයා) - ග්‍රෑම් 500", "ගොරකා - පෙති 3-4", "මිරිස් කුඩු - හැදි 1", "කහ කුඩු - 1/2 හැදි", "සුදුළූණු - කරාබු 4", "කරපිංචා - ඕලු 6", "ලූණු රසයට", "වතුර - කෝප්ප 1"], steps:["මාළු කැබලි කපා හොඳින් සෝදාගන්න.", "ගොරකා වතුරේ පොඟවාගන්න.", "මාළු, ගොරකා, කුළුබඩු, සුදුළූණු, කරපිංචා සහ ලූණු වතුරත් සමග උයන ලෑන්දකට දාන්න.", "මැද ගින්නක මිනිත්තු 15-20ක් උයන්න, විටින් විට හොඳින් කලවම් කරන්න.", "හොද්ද ඝන වූ පසු ගින්න නවත්වන්න."]},
            {id:5, title:"බිත්තර හොද්ද", desc:"උදෑසනට සුදුසුයි.", ing:["බිත්තර - 4", "පොල් කිරි - කෝප්ප 1", "ලූණු - 1 (කපාගත්)", "කහ කුඩු - 1/4 හැදි", "මාළු මිරිස් - 1/2 හැදි", "කරපිංචා - ටිකක්", "ලූණු රසයට"], steps:["බිත්තර තම්බා පීල්ල හලාගන්න.", "ලූණු සහ කරපිංචා තෙම්පරාදු කරන්න.", "කහ කුඩු සහ මාළු මිරිස් එක් කර පොල් කිරි දාන්න.", "තම්බන තුරු උයන්න, පසුව තම්බාගත් බිත්තර එක් කරන්න.", "මිනිත්තු 5ක් තවදුරටත් උයා ලූණු රසට බලාගන්න."]},
            {id:6, title:"අල තෙල් දැමීම", desc:"අල බැදුම.", ing:["අල - ග්‍රෑම් 500 (කපාගත්)", "ලූණු - 1 (දික්කපාගත්)", "කරපිංචා - ඕලු 6", "මාළු මිරිස් - 1 හැදි", "කහ කුඩු - 1/4 හැදි", "තෙල් - හැදි 3", "ලූණු රසයට"], steps:["අල කපා වතුරෙන් සෝදාගන්න, අවශ්‍ය නම් මිනිත්තු 5ක් කුඩු තම්බාගන්න.", "තෙල් රත් කර ලූණු, කරපිංචා දාලා තෙම්පරාදු කරන්න.", "අල එක් කර කහ කුඩු සහ මාළු මිරිස් දාන්න.", "මධ්‍යම ගින්නක නිතර කලවම් කරමින් මිනිත්තු 10-12ක් බදින්න.", "ලූණු රසට එක් කර රත් වෙලාවේ සේවය කරන්න."]},

        ];

        const container = document.getElementById('container');
        recipes.forEach(r => {
            container.innerHTML += `<div class="card" onclick="openModal(${r.id})">
                <img src="https://via.placeholder.com/150" alt="${r.title}">
                <h3>${r.title}</h3></div>`;
        });

        function openModal(id) {
            const r = recipes.find(x => x.id === id);
            document.getElementById('title').innerText = r.title;
            document.getElementById('desc').innerText = r.desc;
            document.getElementById('ings').innerHTML = r.ing.map(i => `<li>${i}</li>`).join('');
            document.getElementById('steps').innerHTML = r.steps.map(s => `<li>${s}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>

</html>
